<div class="min-h-screen bg-gray-50 flex">
  <!-- Left Side - Branding -->
  <div class="hidden lg:flex lg:w-1/2 bg-gradient-to-br from-purple-600 to-pink-600 p-12 flex-col justify-between relative overflow-hidden">
    <!-- Background Pattern -->
    <div class="absolute inset-0 opacity-10">
      <div class="absolute top-0 left-0 w-full h-full" style="background-image: radial-gradient(circle at 2px 2px, white 1px, transparent 0); background-size: 40px 40px;"></div>
    </div>
    
    <div class="relative z-10">
      <div class="flex items-center gap-3 mb-8">
        <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center">
          <span class="text-2xl font-bold text-purple-600">T</span>
        </div>
        <span class="text-2xl font-bold text-white">TaskForge</span>
      </div>
      
      <h1 class="text-4xl font-bold text-white mb-4">Start Your Journey</h1>
      <p class="text-purple-100 text-lg">Join thousands of users who organize their work with TaskForge.</p>
    </div>

    <div class="relative z-10">
      <div class="bg-white/10 backdrop-blur-sm rounded-2xl p-6 border border-white/20">
        <div class="flex gap-2 mb-4">
          <div class="w-2 h-2 bg-green-400 rounded-full"></div>
          <div class="w-2 h-2 bg-blue-400 rounded-full"></div>
          <div class="w-2 h-2 bg-yellow-400 rounded-full"></div>
        </div>
        <p class="text-white font-semibold mb-2">✅ Free forever</p>
        <p class="text-white font-semibold mb-2">✅ Unlimited tasks</p>
        <p class="text-white font-semibold">✅ Real-time sync</p>
      </div>
    </div>
  </div>

  <!-- Right Side - Form -->
  <div class="flex-1 flex items-center justify-center p-8">
    <div class="w-full max-w-md">
      <!-- Mobile Logo -->
      <div class="lg:hidden flex items-center gap-3 mb-8">
        <div class="w-10 h-10 bg-purple-600 rounded-xl flex items-center justify-center">
          <span class="text-xl font-bold text-white">T</span>
        </div>
        <span class="text-xl font-bold text-gray-900">TaskForge</span>
      </div>

      <div class="mb-8">
        <h2 class="text-3xl font-bold text-gray-900 mb-2">Create account</h2>
        <p class="text-gray-600">Get started with your free account</p>
      </div>

      <!-- Error Message -->
      <div *ngIf="error" class="mb-6 p-4 bg-red-50 border border-red-200 rounded-lg flex items-start gap-3">
        <mat-icon class="text-red-500 text-xl">error_outline</mat-icon>
        <p class="text-red-700 text-sm flex-1">{{ error }}</p>
      </div>

      <!-- Register Form -->
      <form class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Full Name</label>
          <mat-form-field appearance="outline" class="w-full">
            <input 
              matInput 
              [(ngModel)]="name" 
              name="name"
              required
              placeholder="John Doe"
            >
          </mat-form-field>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
          <mat-form-field appearance="outline" class="w-full">
            <input 
              matInput 
              type="email" 
              [(ngModel)]="email" 
              name="email"
              required
              placeholder="you@example.com"
            >
          </mat-form-field>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
          <mat-form-field appearance="outline" class="w-full">
            <input 
              matInput 
              type="password" 
              [(ngModel)]="password" 
              name="password"
              required
              placeholder="Create a strong password"
            >
          </mat-form-field>
        </div>

        <button 
          mat-raised-button 
          color="primary" 
          class="w-full h-12 text-base font-semibold" 
          (click)="onRegister()" 
          [disabled]="loading"
          type="button"
        >
          {{ loading ? 'Creating account...' : 'Create account' }}
        </button>
      </form>

      <!-- Login Link -->
      <div class="mt-6 text-center">
        <p class="text-gray-600 text-sm">
          Already have an account? 
          <a routerLink="/login" class="text-purple-600 hover:text-purple-700 font-semibold">Sign in</a>
        </p>
      </div>
    </div>
  </div>
</div>
