<div class="min-h-screen bg-gradient-to-br from-purple-500 via-pink-500 to-red-500 flex items-center justify-center p-4">
  <!-- Animated Background Shapes -->
  <div class="absolute inset-0 overflow-hidden">
    <div class="absolute top-10 right-20 w-72 h-72 bg-white opacity-10 rounded-full blur-3xl animate-pulse"></div>
    <div class="absolute bottom-10 left-20 w-96 h-96 bg-white opacity-10 rounded-full blur-3xl animate-pulse" style="animation-delay: 2s;"></div>
  </div>

  <mat-card class="w-full max-w-md relative z-10 backdrop-blur-sm bg-white/95 shadow-2xl">
    <mat-card-content class="p-8">
      <!-- Logo/Brand -->
      <div class="text-center mb-8">
        <div class="inline-block p-4 bg-gradient-to-br from-purple-500 to-pink-600 rounded-2xl mb-4 shadow-lg">
          <span class="text-4xl">✨</span>
        </div>
        <h1 class="text-3xl font-bold bg-gradient-to-r from-purple-600 to-pink-600 bg-clip-text text-transparent mb-2">
          Join TaskForge
        </h1>
        <p class="text-gray-600">Create your account and start organizing</p>
      </div>

      <!-- Error Message -->
      <div *ngIf="error" class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 rounded-r-lg">
        <div class="flex items-center">
          <mat-icon class="text-red-500 mr-2">error</mat-icon>
          <p class="text-red-700 text-sm">{{ error }}</p>
        </div>
      </div>

      <!-- Register Form -->
      <form class="space-y-5">
        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Full Name</mat-label>
          <input 
            matInput 
            [(ngModel)]="name" 
            name="name"
            required
            placeholder="John Doe"
          >
          <mat-icon matPrefix class="text-gray-400">person</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Email Address</mat-label>
          <input 
            matInput 
            type="email" 
            [(ngModel)]="email" 
            name="email"
            required
            placeholder="you@example.com"
          >
          <mat-icon matPrefix class="text-gray-400">email</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Password</mat-label>
          <input 
            matInput 
            type="password" 
            [(ngModel)]="password" 
            name="password"
            required
            placeholder="Create a strong password"
          >
          <mat-icon matPrefix class="text-gray-400">lock</mat-icon>
        </mat-form-field>

        <button 
          mat-raised-button 
          color="primary" 
          class="w-full h-12 text-base font-semibold bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700" 
          (click)="onRegister()" 
          [disabled]="loading"
          type="button"
        >
          <mat-icon *ngIf="!loading">how_to_reg</mat-icon>
          <span *ngIf="loading" class="inline-block animate-spin mr-2">⏳</span>
          {{ loading ? 'Creating Account...' : 'Create Account' }}
        </button>
      </form>

      <!-- Divider -->
      <div class="relative my-6">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-gray-300"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="px-4 bg-white text-gray-500">Already have an account?</span>
        </div>
      </div>

      <!-- Login Link -->
      <div class="text-center">
        <a 
          routerLink="/login" 
          class="inline-flex items-center gap-2 text-purple-600 hover:text-purple-700 font-semibold transition-colors"
        >
          <mat-icon>login</mat-icon>
          Sign in instead
        </a>
      </div>
    </mat-card-content>
  </mat-card>
</div>
